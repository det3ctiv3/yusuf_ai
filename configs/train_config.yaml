model:
  name: "openai/whisper-large-v3"
  language: "uzbek"
  task: "transcribe"

data:
  dataset_name: "murodbek/uzbek-speech-corpus"
  max_input_length: 30.0
  min_input_length: 0.5
  max_label_tokens: 448
  processed_cache: "data/processed/features"

training:
  output_dir: "outputs/checkpoints"
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  lr_scheduler_type: "cosine"
  max_steps: 6000
  save_steps: 500
  eval_steps: 500
  bf16: true
  fp16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  group_by_length: true
  seed: 42

lora:
  use_lora: true
  r: 32
  lora_alpha: 64
  target_modules: ["q_proj", "v_proj", "k_proj", "out_proj", "fc1", "fc2"]
  dropout: 0.05

hub:
  push_to_hub: true
  model_id: "whiteh4t/whisper-large-v3-uzbek"

wandb:
  project: "whisper-uzbek"
  run_name: "lora-r32-lr1e5"
  tags: ["uzbek", "whisper-large-v3", "lora"]
